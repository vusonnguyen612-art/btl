name: Java CI

on:
  push:
    branches: [ master, '**' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC — OWASP vulnerability check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: '123456789'
          MYSQL_DATABASE: auction_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Initialize Database
        run: mysql -h 127.0.0.1 -uroot -p123456789 < src/main/sql/schema.sql

      - name: Compile
        run: mvn -B compile

      - name: Run tests with coverage
        run: mvn -B verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: target/site/jacoco/
          retention-days: 30

      - name: Package fat-JAR
        run: mvn -B package -DskipTests -Djacoco.skip=true

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: auction-system-${{ github.sha }}
          path: target/auction-system-*.jar
          retention-days: 90

  vulnerability-check:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency Check
        run: mvn -B dependency-check:check -P vulnerability-check

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report-${{ github.sha }}
          path: target/dependency-check-report.*
          retention-days: 30
